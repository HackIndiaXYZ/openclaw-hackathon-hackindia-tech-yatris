<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - HumanProof</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>HumanProof</h2>

    <a href="#">Dashboard</a>
    <a href="#liveDemo">Live Demo</a>
    <a href="#">API Keys</a>
    <a href="#">Analytics</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Human Verification Dashboard</h1>

    <!-- STATS -->
    <div class="stats">

      <div class="stat-card">
        <p>Curiosity</p>
        <h2 id="curiosity">0</h2>
      </div>

      <div class="stat-card">
        <p>Attention</p>
        <h2 id="attention">0</h2>
      </div>

      <div class="stat-card">
        <p>Flow</p>
        <h2 id="flow">0</h2>
      </div>

    </div>

    <!-- DEMO BOX -->
    <div class="demo-box" id="demoArea">
      Move mouse here 👇
    </div>

    <!-- SCORE -->
    <div class="score-box">
      <h1 id="score">0</h1>
      <p>Human Score</p>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
